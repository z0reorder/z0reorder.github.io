        // ========== 页面渲染函数 ==========
        function renderCopyList() {
            const container = document.getElementById("copyContainer");
            let html = "";
            copyData.forEach(copy => {
                // 副本外层容器，标题、图片永久展示不折叠，添加class="center"
                html += `
                <div class="copy-box" id="${copy.id}">
                    <div class="center copy-title">${copy.copyName}</div>
                    <div class="copy-img-wrap center">
                        <img src="${copy.imgSrc}" alt="${copy.copyName}">
                    </div>
                `;
                // 循环渲染该副本所有开放难度
                copy.difficultyList.forEach((diff, diffIdx) => {
                    const foldId = `${copy.id}_diff_${diffIdx}`;
                    html += `
                    <div class="difficulty-item">
                        <button class="fold-btn" data-target="${foldId}">展开【${diff.diffName}】难度详情</button>
                        <div class="fold-content" id="${foldId}">
                            <div class="difficulty-name">${diff.diffName}难度基础要求</div>
                            <div class="power-text color_Red">战力要求：${diff.needPower}</div>
                            <hr>
                            <div class="rate-wrap">
                    `;
                    // 循环每个评级
                    diff.rateList.forEach(rate => {
                        html += `<div class="rate-block">
                            <div class="rate-title">${rate.level}评级掉落规则</div>`;
                        // 遍历掉落配置，按Drop数组顺序拼接文本
                        rate.drops.forEach((dropItem, idx) => {
                            const [percent, num] = dropItem;
                            const dropName = diff.Drop[idx];
                            html += `<div>${percent}%概率掉落${dropName}×${num}</div>`;
                        });
                        html += `</div>`;
                    });
                    // 通关评语
                    html += `
                            </div>
                            <div class="comment-text">
                                <strong>通关评语：</strong>${diff.rateList[0].comment}
                            </div>
                        </div>
                    </div>
                    `;
                });
                html += `</div><br>`;
            });
            container.innerHTML = html;
            bindFoldEvent();
        }
        // ==========放回上一页==========
        function goBack() {
            window.history.back();
        }

        // ========== 折叠面板点击交互 ==========
        function bindFoldEvent() {
            const btns = document.querySelectorAll(".fold-btn");
            btns.forEach(btn => {
                btn.onclick = function () {
                    const targetId = this.dataset.target;
                    const targetDom = document.getElementById(targetId);
                    targetDom.classList.toggle("show");
                    const diffName = targetId.split("_diff_")[1];
                    if(targetDom.classList.contains("show")){
                        this.innerText = `收起【${diff.diffName}】难度详情`;
                    }else{
                        this.innerText = `展开【${diff.diffName}】难度详情`;
                    }
                }
            })
        }
